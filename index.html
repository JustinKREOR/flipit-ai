function Reveal({ children, delay=0, style }) {
  const ref = useRef(null);
  const [vis, setVis] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(es => { if(es[0].isIntersecting){ setVis(true); obs.disconnect(); } }, { threshold:0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return <div ref={ref} style={{ opacity:vis?1:0, transform:vis?"translateY(0)":"translateY(24px)", transition:`opacity 0.8s ease ${delay}ms, transform 0.8s ease ${delay}ms`, ...style }}>{children}</div>;
}

              {/* Name */}
              <div>
                <label style={{ display: "block", fontSize: 13, color: "var(--ink-dim)", fontWeight: 500, marginBottom: 7, fontFamily: "'JetBrains Mono',monospace", letterSpacing: "0.04em" }}>{labels.name}</label>
                <input
                  type="text" required value={name} onChange={e => setName(e.target.value)}
                  placeholder={labels.namePh}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = accent}
                  onBlur={e => e.target.style.borderColor = "var(--line2)"}
                />
              </div>

              {/* Email */}
              <div>
                <label style={{ display: "block", fontSize: 13, color: "var(--ink-dim)", fontWeight: 500, marginBottom: 7, fontFamily: "'JetBrains Mono',monospace", letterSpacing: "0.04em" }}>{labels.emailLbl}</label>
                <input
                  type="email" required value={email} onChange={e => setEmail(e.target.value)}
                  placeholder={labels.emailPh}
                  style={inputStyle}
                  onFocus={e => e.target.style.borderColor = accent}
                  onBlur={e => e.target.style.borderColor = "var(--line2)"}
                />
              </div>

              {/* Message */}
              <div>
                <label style={{ display: "block", fontSize: 13, color: "var(--ink-dim)", fontWeight: 500, marginBottom: 7, fontFamily: "'JetBrains Mono',monospace", letterSpacing: "0.04em" }}>{labels.msgLbl}</label>
                <textarea
                  required value={message} onChange={e => setMessage(e.target.value)}
                  placeholder={labels.msgPh} rows={5}
                  style={{ ...inputStyle, resize: "vertical", minHeight: 120 }}
                  onFocus={e => e.target.style.borderColor = accent}
                  onBlur={e => e.target.style.borderColor = "var(--line2)"}
                />
              </div>

              {status === "error" && (
                <div style={{ padding: "12px 16px", background: "rgba(231,100,78,0.1)", border: "1px solid rgba(231,100,78,0.4)", borderRadius: 10, fontSize: 13, color: "#e7896e" }}>{labels.errorBody}</div>
              )}

              <button type="submit" disabled={status === "sending"} style={{
                marginTop: 4,
                padding: "15px 24px",
                background: status === "sending" ? `${accent}88` : accent,
                color: "#0a0906",
                borderRadius: 999,
                fontWeight: 600, fontSize: 15,
                border: "none", cursor: status === "sending" ? "not-allowed" : "pointer",
                fontFamily: "inherit",
                display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
                transition: "all 0.2s",
                boxShadow: `0 8px 24px ${accent}30`,
              }}>
                {status === "sending" && (
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{ animation: "spin 0.8s linear infinite" }}><path d="M21 12a9 9 0 1 1-6.22-8.56"/></svg>
                )}
                {status === "sending" ? labels.sending : labels.send}
              </button>
            </form>
          </>
        )}
      </div>

      <style>{`
        @keyframes fade-modal { from { opacity:0; } to { opacity:1; } }
        @keyframes slide-modal { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
        @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
      `}</style>
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────────────── */
function App() {
  const [lang, setLang] = useState("fr");
  const [accent] = useState("#aee83d");
  const [bannerClosed, setBannerClosed] = useState(false);
  const [contactOpen, setContactOpen] = useState(false);
  const bannerVisible = !bannerClosed;
  const bannerOffset = bannerVisible ? BANNER_H : 0;

  useEffect(() => {
    document.documentElement.style.setProperty("--accent", accent);
    document.documentElement.style.setProperty("--accent2", "#c8f050");
  }, [accent]);

  // Intercept mailto: and support link clicks globally
  useEffect(() => {
    const handler = (e) => {
      const a = e.target.closest("a");
      if (!a) return;
      const href = a.getAttribute("href") || "";
      const text = a.textContent || "";
      if (
        href === "mailto:support@flipitapp.ai" ||
        href === "mailto:bugs@flipitapp.ai" ||
        text.includes("support@flipitapp.ai") ||
        text.includes("bugs@flipitapp.ai")
      ) {
        e.preventDefault();
        setContactOpen(true);
      }
    };
    document.addEventListener("click", handler);
    return () => document.removeEventListener("click", handler);
  }, []);

  const openContact = (e) => { e.preventDefault(); setContactOpen(true); };

  return (
    <>
      {bannerVisible && <BetaBanner accent={accent} lang={lang} onClose={() => setBannerClosed(true)} />}
      {contactOpen && <ContactModal lang={lang} accent={accent} onClose={() => setContactOpen(false)} />}
      <div style={{ paddingTop: bannerOffset }}>
        <Nav lang={lang} setLang={setLang} bannerOffset={bannerOffset} onContactClick={openContact} />
        <Hero lang={lang} accent={accent} />
        <HowItWorks lang={lang} accent={accent} />
        <Features lang={lang} accent={accent} />
        <Stats lang={lang} accent={accent} />
        <ForWho lang={lang} accent={accent} />
        <Deals lang={lang} accent={accent} />
        <Testimonials lang={lang} accent={accent} />
        <Pricing lang={lang} accent={accent} />
        <FAQ lang={lang} accent={accent} />
        <Footer lang={lang} accent={accent} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("flipit-root")).render(<App />);
</script>
</body>
</html>
